name: tests

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/tests.yml'

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Testar normalização de atendimentos
        run: python -m tests.test_atendimentos

      - name: Testar módulo geocode (funções puras + cache)
        run: python -m tests.test_geocode
